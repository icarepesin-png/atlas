# Configuration centrale ATLAS. Toute ponderation / seuil vit ici, jamais en dur dans le code.

universe:
  # Indices actifs en MVP (resolus via atlas/universe/loader.py)
  indices: [sp500, nasdaq100, stoxx600_sample]
  min_dollar_volume: 5000000      # liquidite mini (USD / jour, moyenne 20j)
  min_price: 3.0                  # filtre penny stocks
  max_tickers: 1500               # plafond MVP (Yahoo). Polygon/Databento pour 10k+.

data:
  provider: yahoo                 # yahoo | polygon | databento
  cache_dir: data/cache
  history_years: 25               # backtests depuis 2000 quand l'historique existe
  fundamentals_provider: yahoo    # yahoo | fmp | edgar

scoring:
  # Ponderations du score composite (somme = 1.0). Mises a jour par le module learning
  # uniquement apres validation humaine (voir learning/feedback.py).
  weights:
    fundamental: 0.35
    technical: 0.25
    macro: 0.15
    sector: 0.15
    sentiment: 0.10
  winsorize_pct: 0.02             # ecretage des outliers avant z-score
  sector_neutral: true            # ranking intra-secteur pour les facteurs fondamentaux

signals:
  min_composite_score: 85
  min_fundamental_score: 80
  min_technical_score: 80
  min_sector_score: 70
  stop_atr_multiple: 2.0
  trailing_atr_multiple: 3.0
  take_profit_r: [1.5, 2.5, 4.0]  # TP1/TP2/TP3 en multiples de R
  atr_period: 14

portfolio:
  method: volatility_targeting    # equal_weight | inverse_vol | volatility_targeting | hrp
  target_volatility: 0.12         # vol annualisee cible du portefeuille
  max_positions: 25
  max_weight_per_position: 0.05
  max_weight_per_sector: 0.25
  kelly_cap: 0.25                 # fraction de Kelly maximale appliquee
  risk_per_trade: 0.0075          # 0.75% du capital risque par trade (distance au stop)

risk:
  max_portfolio_drawdown: 0.15    # au-dela: reduction de risque automatique
  drawdown_derisk_steps:          # paliers de reduction de l'exposition brute
    - { drawdown: 0.08, gross_exposure: 0.75 }
    - { drawdown: 0.12, gross_exposure: 0.50 }
    - { drawdown: 0.15, gross_exposure: 0.25 }
  max_position_drawdown: 0.20     # stop "catastrophe" par position
  max_avg_correlation: 0.70       # alerte si correlation moyenne du book depasse
  max_country_weight: 0.70
  rebalance_drift_threshold: 0.20 # rebalance si un poids derive de 20% en relatif

backtest:
  start: "2000-01-01"
  initial_capital: 100000
  commission_bps: 2               # 2 points de base par cote
  slippage_bps: 5
  spread_bps: 3
  rebalance: monthly              # daily | weekly | monthly
  benchmark: SPY

validation:
  walk_forward:
    train_years: 5
    test_years: 1
    step_years: 1
  monte_carlo:
    n_simulations: 1000
    block_size_days: 21

macro:
  fred_series:
    cpi: CPIAUCSL
    ppi: PPIACO
    unemployment: UNRATE
    gdp: GDPC1
    fed_funds: FEDFUNDS
    yield_curve_10y2y: T10Y2Y
    m2: M2SL
    industrial_production: INDPRO

sectors:
  # ETFs proxys pour la rotation sectorielle (momentum + force relative vs SPY)
  benchmark: SPY
  etfs:
    Technology: XLK
    AI: BOTZ
    Semiconductor: SMH
    Healthcare: XLV
    Energy: XLE
    Utilities: XLU
    Industrials: XLI
    Financials: XLF
    ConsumerDiscretionary: XLY
    ConsumerStaples: XLP
    Materials: XLB
    RealEstate: XLRE
    Communication: XLC

execution:
  broker: paper                   # paper | alpaca | ibkr
  order_type: limit
  limit_offset_bps: 10

sentiment_ghost:
  # Mode fantome: le LLM local note les titres chaque nuit, scores journalises
  # a POIDS NUL (jamais dans le composite). Validation par IC avant activation.
  enabled: true
  model: llama3.1:8b
  tickers_per_night: 30
  refresh_days: 7
